<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CTR Prediction System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>CTR Prediction System</h1>

            <p class="subtitle">
                Predict advertisement click probability and expected bidding revenue
            </p>

            <form action="/predict" method="POST">

                <div class="grid">

                    {% for i in range(1,14) %}

                    <div class="input-box">

                        <label>I{{i}}</label>

                        <input
                            type="number"
                            step="any"
                            name="I{{i}}"
                            placeholder="Enter value"
                        >

                    </div>

                    {% endfor %}

                </div>

                <div class="bid-section">

                    <label>Advertisement Bid Value ($)</label>

                    <input
                        type="number"
                        step="any"
                        name="bid_value"
                        placeholder="Enter bid amount"
                    >

                </div>

                <button type="submit">
                    Predict CTR & Revenue
                </button>

            </form>

            {% if prediction_text %}

            <div class="result">

                <h2>{{ prediction_text }}</h2>

                <p>{{ bid_text }}</p>

                <p>{{ expected_text }}</p>

            </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
